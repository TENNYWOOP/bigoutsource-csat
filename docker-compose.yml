version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=csat_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/csat_db?schema=public
    # Removed volume mounts for source code so we use the built image
    depends_on:
      - db
    # Running db push in the command for the demo to auto-migrate the database
    command: sh -c "npx prisma generate && npx prisma db push --accept-data-loss && npm run start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80" # Map host port 80 to Nginx port 80
    environment:
      - NODE_ENV=production
      - DOMAIN_NAME=localhost 10.10.60.3
    # Removed volume mounts

volumes:
  pgdata:
